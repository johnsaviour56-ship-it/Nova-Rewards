version: "3.9"

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_rewards}
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_WAL_ARCHIVE_DIR: ${BACKUP_WAL_ARCHIVE_DIR:-/var/lib/postgresql/wal-archive}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
      - ./backups/wal:/var/lib/postgresql/wal-archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova} -d ${POSTGRES_DB:-nova_rewards}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60s
      - -c
      - max_wal_senders=3
      - -c
      - archive_command=/usr/local/bin/archive-wal.sh %p %f

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nova_rewards}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_DIR: /app/../backups/base
      BACKUP_WAL_ARCHIVE_DIR: /app/../backups/wal
    ports:
      - "4000:4000"
    volumes:
      - ./backups:/app/../backups
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
